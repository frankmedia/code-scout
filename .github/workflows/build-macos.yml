name: Manual CI Draft Build - macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute release tag
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}-macos-ci-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Validate required macOS notarization secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for v in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID
          do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              missing=1
            fi
          done
          for v in APPLE_API_KEY APPLE_API_ISSUER APPLE_API_PRIVATE_KEY; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Refusing macOS build: signing/notarization secrets are incomplete."
            exit 1
          fi

      - name: Import macOS signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm certificate.p12

      - name: Write App Store Connect API key file
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          api_key="$(printf '%s' "${APPLE_API_KEY:-}" | tr -d '\r\n' | xargs)"
          api_issuer_raw="$(printf '%s' "${APPLE_API_ISSUER:-}" | tr -d '\r\n' | xargs)"
          api_issuer_hex="$(printf '%s' "$api_issuer_raw" | tr -cd '0-9a-fA-F')"
          api_issuer="$api_issuer_raw"
          team_id="$(printf '%s' "${APPLE_TEAM_ID:-}" | tr -d '\r\n' | xargs)"
          if [ "${#api_issuer_hex}" -eq 32 ]; then
            api_issuer="$(printf '%s-%s-%s-%s-%s' \
              "${api_issuer_hex:0:8}" \
              "${api_issuer_hex:8:4}" \
              "${api_issuer_hex:12:4}" \
              "${api_issuer_hex:16:4}" \
              "${api_issuer_hex:20:12}")"
          fi
          api_private_key="$(printf '%s' "${APPLE_API_PRIVATE_KEY:-}" | sed 's/\r$//')"
          if [ "${#team_id}" -lt 3 ]; then
            echo "APPLE_TEAM_ID is invalid after normalization (length < 3)."
            exit 1
          fi
          echo "APPLE_TEAM_ID=$team_id" >> "$GITHUB_ENV"
          if ! printf '%s' "$api_issuer" | grep -Eq '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'; then
            echo "APPLE_API_ISSUER is not a valid UUID after normalization: [$api_issuer]"
            exit 1
          fi
          key_file="$RUNNER_TEMP/AuthKey_${api_key}.p8"
          printf '%s\n' "$api_private_key" > "$key_file"
          chmod 600 "$key_file"
          echo "APPLE_API_KEY_PATH=$key_file" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=$api_key" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$api_issuer" >> "$GITHUB_ENV"

      - name: Build Tauri app (macOS, notarized)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: "Code Scout v${{ steps.meta.outputs.version }} (macOS CI)"
          releaseBody: |
            Notarized macOS build from GitHub Actions (manual workflow).

            Tag: ${{ steps.meta.outputs.tag }}
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: false
          args: --target aarch64-apple-darwin

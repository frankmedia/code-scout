name: Build macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release tag
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}-macos-ci-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (macOS, unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: "Code Scout v${{ steps.meta.outputs.version }} (macOS CI)"
          releaseBody: |
            Unsigned macOS build from GitHub Actions (manual workflow).

            Gatekeeper may warn on first launch when unsigned.

            Tag: ${{ steps.meta.outputs.tag }}
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: false
          args: --target aarch64-apple-darwin

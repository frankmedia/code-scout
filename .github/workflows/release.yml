name: Release

on:
  push:
    tags:
      - "v*"
  # Intentionally no workflow_dispatch: ref would be a branch (e.g. main) and
  # tauri-action would use tagName=main — invalid for releases. Ship with `git push origin vX.Y.Z`.

permissions:
  contents: write

jobs:
  # One release record for this tag — matrix jobs only *upload* assets. Without this,
  # four parallel tauri-action runs race on `gh release create` / asset APIs and all can fail.
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.rel.outputs.release_id }}
    steps:
      - name: Ensure release exists for tag
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"
          # Use `gh release view` so we always get a numeric databaseId. A bare
          # `gh api …/releases/tags/… --jq .id` on failure can yield non-numeric
          # junk into GITHUB_OUTPUT, which breaks tauri-action (Number(releaseId) → NaN).
          rid=""
          if out="$(gh release view "$TAG" --repo "$REPO" --json databaseId -q .databaseId 2>/dev/null)"; then
            rid="$out"
          fi
          if [ -z "${rid}" ]; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "Code Scout ${TAG}" \
              --notes "Multi-platform installers and bundles (CI matrix)." \
              --latest
            rid="$(gh release view "$TAG" --repo "$REPO" --json databaseId -q .databaseId)"
          fi
          case "$rid" in
            ''|*[!0-9]*)
              echo "Invalid release databaseId for tag ${TAG}: [${rid}]"
              exit 1
              ;;
          esac
          echo "release_id=${rid}" >> "$GITHUB_OUTPUT"
          echo "Using release id=${rid} for tag ${TAG}"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            extra_args: "--config src-tauri/tauri.release.conf.json"
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            extra_args: "--config src-tauri/tauri.release.conf.json"
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            # scout-stt is macOS-only; strip it + enable all bundle targets for release
            extra_args: "--config src-tauri/tauri.nosidecar.conf.json --config src-tauri/tauri.release.conf.json"
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            # scout-stt is macOS-only; strip it + enable all bundle targets for release
            extra_args: "--config src-tauri/tauri.nosidecar.conf.json --config src-tauri/tauri.release.conf.json"

    runs-on: ${{ matrix.platform }}
    env:
      # JS actions (checkout, setup-node) run on Node 24 before the platform default switch.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ── Linux deps ──────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Rust ────────────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.rust_target }}

      # ── Node ────────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # Icons are committed to git — only regenerate on macOS (where swiftc + sharp are reliable).
      # Skipping on Linux/Windows avoids npx/sharp path issues on those runners.
      - name: Generate app icons
        if: matrix.platform == 'macos-latest'
        run: npm run tauri:icon

      # ── macOS signing/notarization (strict) ────────────────────────────
      # Hard-fail release builds when Apple credentials are missing.
      # This prevents publishing unsigned / non-notarized macOS binaries.
      - name: Validate required macOS notarization secrets
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for v in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID
          do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              missing=1
            fi
          done
          for v in APPLE_API_KEY APPLE_API_ISSUER APPLE_API_PRIVATE_KEY; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Refusing macOS release build: notarization/signing secrets are incomplete."
            exit 1
          fi

      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm certificate.p12

      - name: Verify Developer ID Application certificate
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if ! printf '%s' "${APPLE_SIGNING_IDENTITY:-}" | grep -q '^Developer ID Application:'; then
            echo "APPLE_SIGNING_IDENTITY must start with 'Developer ID Application:'"
            exit 1
          fi
          identities="$(security find-identity -v -p codesigning build.keychain || true)"
          echo "$identities"
          if ! printf '%s' "$identities" | grep -q "Developer ID Application"; then
            echo "Imported certificate is not a Developer ID Application cert."
            echo "Export and upload the correct Developer ID Application .p12 to APPLE_CERTIFICATE."
            exit 1
          fi

      - name: Export macOS signing env for Tauri
        shell: bash
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          if [ "$MATRIX_PLATFORM" != "macos-latest" ]; then
            exit 0
          fi
          # Normalize secrets copied from UI (remove CR/LF and surrounding spaces).
          api_key="$(printf '%s' "${APPLE_API_KEY:-}" | tr -d '\r\n' | xargs)"
          api_issuer_raw="$(printf '%s' "${APPLE_API_ISSUER:-}" | tr -d '\r\n' | xargs)"
          api_issuer_hex="$(printf '%s' "$api_issuer_raw" | tr -cd '0-9a-fA-F')"
          api_issuer="$api_issuer_raw"
          team_id="$(printf '%s' "${APPLE_TEAM_ID:-}" | tr -d '\r\n' | xargs)"
          if [ "${#api_issuer_hex}" -eq 32 ]; then
            api_issuer="$(printf '%s-%s-%s-%s-%s' \
              "${api_issuer_hex:0:8}" \
              "${api_issuer_hex:8:4}" \
              "${api_issuer_hex:12:4}" \
              "${api_issuer_hex:16:4}" \
              "${api_issuer_hex:20:12}")"
          fi
          api_private_key="$(printf '%s' "${APPLE_API_PRIVATE_KEY:-}" | sed 's/\r$//')"
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          if [ "${#team_id}" -lt 3 ]; then
            echo "APPLE_TEAM_ID is invalid after normalization (length < 3)."
            exit 1
          fi
          echo "APPLE_TEAM_ID=$team_id" >> "$GITHUB_ENV"
          if ! printf '%s' "$api_issuer" | grep -Eq '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'; then
            echo "APPLE_API_ISSUER is not a valid UUID after normalization: [$api_issuer]"
            exit 1
          fi
          key_file="$RUNNER_TEMP/AuthKey_${api_key}.p8"
          printf '%s\n' "$api_private_key" > "$key_file"
          chmod 600 "$key_file"
          echo "APPLE_API_KEY=$api_key" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$api_issuer" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$key_file" >> "$GITHUB_ENV"

      # ── Build ──────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }} ${{ matrix.extra_args }}

name: Release

on:
  push:
    tags:
      - "v*"
  # Intentionally no workflow_dispatch: ref would be a branch (e.g. main) and
  # tauri-action would use tagName=main — invalid for releases. Ship with `git push origin vX.Y.Z`.

permissions:
  contents: write

jobs:
  # One release record for this tag — matrix jobs only *upload* assets. Without this,
  # four parallel tauri-action runs race on `gh release create` / asset APIs and all can fail.
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.rel.outputs.release_id }}
    steps:
      - name: Ensure release exists for tag
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"
          # Do not use --verify-tag: it often fails for annotated tags / timing on tag-push workflows.
          rid="$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.id' 2>/dev/null || true)"
          if [ -z "${rid}" ]; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "Code Scout ${TAG}" \
              --notes "Multi-platform installers and bundles (CI matrix)." \
              --latest
            rid="$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.id')"
          fi
          echo "release_id=${rid}" >> "$GITHUB_OUTPUT"
          echo "Using release id=${rid} for tag ${TAG}"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    env:
      # JS actions (checkout, setup-node) run on Node 24 before the platform default switch.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Linux deps ──────────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Rust ────────────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.rust_target }}

      # ── Node ────────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # ── macOS signing ──────────────────────────────────────────────────
      # `secrets.*` is required here — `env.APPLE_CERTIFICATE` is never set on the job,
      # so the old condition skipped import while still passing APPLE_SIGNING_IDENTITY
      # to the build, which breaks codesign (identity not in keychain).
      # Note: `secrets` must not appear in `if:` (GitHub rejects the workflow → 0 jobs).
      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "No APPLE_CERTIFICATE secret — skipping keychain import (unsigned mac build)."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm certificate.p12

      # ── Build ──────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only pass signing/notary/updater keys when the cert bundle exists; otherwise
          # build unsigned macOS artifacts (still fine for CI / draft testing).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_TEAM_ID || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: npm run tauri:build
          tagName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }}

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Code Scout ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            || echo "Release already exists"

  build-macos:
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
          
      - name: Test frontend build
        run: npm run build

      - name: Build Tauri
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Zip and upload app bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          APP=$(ls -d *.app | head -1)
          if [ -n "$APP" ]; then
            zip -r "CodeScout-${{ matrix.target }}.zip" "$APP"
            gh release upload "${{ github.ref_name }}" "CodeScout-${{ matrix.target }}.zip" --clobber || true
          fi

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm install
          
      - name: Test frontend build
        run: npm run build

      - name: Build Tauri
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --config src-tauri/tauri.nosidecar.conf.json

      - name: Find and upload artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Looking for artifacts..."
          find src-tauri/target -name "*.msi" -o -name "*.exe" 2>/dev/null | head -20
          
          # Upload MSI
          MSI=$(find src-tauri/target -name "*.msi" -type f | head -1)
          if [ -n "$MSI" ]; then
            echo "Uploading $MSI"
            gh release upload "${{ github.ref_name }}" "$MSI" --clobber || true
          fi
          
          # Upload NSIS exe
          EXE=$(find src-tauri/target -name "*-setup.exe" -type f | head -1)
          if [ -n "$EXE" ]; then
            echo "Uploading $EXE"
            gh release upload "${{ github.ref_name }}" "$EXE" --clobber || true
          fi

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm install
          
      - name: Test frontend build
        run: npm run build

      - name: Build Tauri
        run: npm run tauri build -- --target x86_64-unknown-linux-gnu --config src-tauri/tauri.nosidecar.conf.json

      - name: Find and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the actual built files
          echo "Looking for artifacts..."
          find src-tauri/target -name "*.AppImage" -o -name "*.deb" 2>/dev/null | head -20
          
          # Upload AppImage
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" -type f | head -1)
          if [ -n "$APPIMAGE" ]; then
            echo "Uploading $APPIMAGE"
            gh release upload "${{ github.ref_name }}" "$APPIMAGE" --clobber || true
          fi
          
          # Upload deb
          DEB=$(find src-tauri/target -name "*.deb" -type f | head -1)
          if [ -n "$DEB" ]; then
            echo "Uploading $DEB"
            gh release upload "${{ github.ref_name }}" "$DEB" --clobber || true
          fi
